version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  server:
    build: ./server
    ports:
      - "3001:3001"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
  client:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - server
